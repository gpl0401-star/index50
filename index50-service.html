<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index 50 · 资讯整理平台 · Index 50</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #161310; --ink-secondary: #5A5045; --ink-muted: #9A8E82;
    --paper: #F6F2EB; --paper-mid: #EDE7DC; --rule: #D4CAB8;
    --accent: #1A5C48;
    --tag-event: #3D2B14; --tag-event-bg: #F5E6CE;
    --tag-service: #152840; --tag-service-bg: #D9E8F5;
    --mono: 'IBM Plex Mono', monospace;
    --serif-cn: 'Noto Serif SC', serif;
    --serif-en: 'EB Garamond', serif;
  }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; }
  body { background-color: var(--paper); color: var(--ink); font-family: var(--serif-cn); font-weight: 300; line-height: 1.8; min-height: 100vh; }
  .site-wrap { max-width: 760px; margin: 0 auto; padding: 0 2rem; }

  /* ── Site header ── */
  .site-header { padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--rule); display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; }
  .site-header-left { display: flex; align-items: baseline; gap: 0.75rem; }
  .site-num { font-family: var(--mono); font-size: 0.65rem; font-weight: 500; color: var(--accent); letter-spacing: 0.1em; border: 1px solid var(--accent); padding: 2px 6px; border-radius: 2px; }
  .site-name { font-family: var(--serif-en); font-size: 1.1rem; font-weight: 400; color: var(--ink); text-decoration: none; }
  .back-link { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-muted); text-decoration: none; letter-spacing: 0.06em; transition: color 0.15s; }
  .back-link:hover { color: var(--accent); }

  /* ── 1. 标题区 ── */
  .entry-header { padding: 2.5rem 0 1.75rem; border-bottom: 1px solid var(--rule); }
  .entry-meta-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.85rem; flex-wrap: wrap; }
  .entry-tag { font-family: var(--mono); font-size: 0.6rem; font-weight: 500; letter-spacing: 0.1em; padding: 1px 6px; border-radius: 2px; display: inline-block; }
  .entry-tag.service { background: var(--tag-service-bg); color: var(--tag-service); }
  .entry-category-tag { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.08em; padding: 1px 6px; border-radius: 2px; background: var(--paper-mid); color: var(--ink-secondary); display: inline-block; }
  .entry-date-posted { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-muted); }
  .entry-client-link { font-family: var(--mono); font-size: 0.65rem; color: var(--accent); text-decoration: none; letter-spacing: 0.03em; }
  .entry-client-link:hover { text-decoration: underline; }
  .entry-title { font-family: var(--serif-cn); font-size: 1.9rem; font-weight: 400; color: var(--ink); line-height: 1.3; letter-spacing: -0.01em; }

  /* ── 图片（建议填写）── */
  .entry-image { margin: 1.75rem 0 0; }
  .entry-image img { width: 100%; height: auto; display: block; border-radius: 3px; border: 1px solid var(--rule); }
  .entry-image-placeholder { width: 100%; aspect-ratio: 16/7; background: var(--paper-mid); border: 1px solid var(--rule); border-radius: 3px; display: flex; align-items: center; justify-content: center; }
  .entry-image-placeholder span { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-muted); letter-spacing: 0.1em; }

  /* ── 主体 ── */
  .entry-body { padding: 1.75rem 0 2rem; display: grid; grid-template-columns: 1fr 13.5rem; gap: 0 3rem; border-bottom: 1px solid var(--rule); }
  .entry-main {}

  /* ── 服务类别 badge（主体内显示）── */
  .service-category-row { margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
  .service-category-label { font-family: var(--mono); font-size: 0.58rem; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.14em; text-transform: uppercase; }
  .service-category-value { font-family: var(--mono); font-size: 0.68rem; color: var(--ink-secondary); letter-spacing: 0.06em; }

  /* ── 服务说明 ── */
  .entry-section { margin-bottom: 1.5rem; }
  .entry-section-label { font-family: var(--mono); font-size: 0.58rem; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .entry-desc { font-family: var(--serif-cn); font-size: 0.925rem; font-weight: 300; color: var(--ink-secondary); line-height: 1.9; }
  .entry-desc p + p { margin-top: 0.75em; }

  /* ── 右栏 info panel ── */
  .info-panel { border-left: 1px solid var(--rule); padding-left: 1.75rem; }
  .info-group { margin-bottom: 1.4rem; }
  .info-group:last-child { margin-bottom: 0; }
  .info-label { font-family: var(--mono); font-size: 0.58rem; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 0.3rem; }
  .info-value { font-family: var(--serif-cn); font-size: 0.875rem; font-weight: 400; color: var(--ink); line-height: 1.55; }
  .info-value.mono { font-family: var(--mono); font-size: 0.78rem; letter-spacing: 0.02em; }
  .info-value a { color: var(--accent); text-decoration: none; }
  .info-value a:hover { text-decoration: underline; }
  .info-note { font-size: 0.78rem; font-weight: 300; color: var(--ink-muted); margin-top: 0.2rem; line-height: 1.5; }
  .info-optional-tag { font-family: var(--mono); font-size: 0.55rem; color: var(--ink-muted); letter-spacing: 0.08em; margin-left: 0.4rem; opacity: 0.7; }

  /* ── CTA bar ── */
  .cta-bar { margin-top: 2rem; padding: 1.25rem 1.5rem; background: var(--paper-mid); border-radius: 3px; border: 1px solid var(--rule); display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .cta-text { font-size: 0.85rem; font-weight: 300; color: var(--ink-secondary); line-height: 1.6; }
  .cta-text strong { font-weight: 500; color: var(--ink); }
  .cta-btn { font-family: var(--mono); font-size: 0.65rem; font-weight: 500; color: var(--paper); background: var(--accent); text-decoration: none; letter-spacing: 0.08em; padding: 6px 14px; border-radius: 2px; white-space: nowrap; transition: opacity 0.15s; }
  .cta-btn:hover { opacity: 0.85; }

  /* ── 面包屑导航 ── */
  .entry-nav { padding: 1.5rem 0; display: flex; align-items: baseline; gap: 0.75rem; border-bottom: 1px solid var(--paper-mid); }
  .nav-label { font-family: var(--mono); font-size: 0.6rem; color: var(--ink-muted); letter-spacing: 0.1em; }
  .nav-link { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-secondary); text-decoration: none; transition: color 0.15s; }
  .nav-link:hover { color: var(--accent); }
  .nav-sep { color: var(--rule); font-size: 0.75rem; }

  footer { padding: 2rem 0 3rem; display: flex; justify-content: space-between; align-items: center; }
  .footer-mark { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-muted); }
  .footer-back { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-muted); text-decoration: none; letter-spacing: 0.06em; transition: color 0.15s; }
  .footer-back:hover { color: var(--accent); }

  @media (max-width: 600px) {
    .site-wrap { padding: 0 1.25rem; }
    .entry-title { font-size: 1.45rem; }
    .entry-body { grid-template-columns: 1fr; gap: 0; }
    .info-panel { border-left: none; border-top: 1px solid var(--rule); padding-left: 0; padding-top: 1.5rem; margin-top: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem 1.5rem; }
    .info-group { margin-bottom: 0; }
    .cta-bar { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
