<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关于 Index 50 · 资讯有序</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #161310; --ink-secondary: #5A5045; --ink-muted: #9A8E82;
    --paper: #F6F2EB; --paper-mid: #EDE7DC; --rule: #D4CAB8;
    --accent: #1A5C48;
    --mono: 'IBM Plex Mono', monospace;
    --serif-cn: 'Noto Serif SC', serif;
    --serif-en: 'EB Garamond', serif;
  }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; }
  body { background-color: var(--paper); color: var(--ink); font-family: var(--serif-cn); font-weight: 300; line-height: 1.8; min-height: 100vh; }
  .site-wrap { max-width: 760px; margin: 0 auto; padding: 0 2rem; }

  /* ── Header ── */
  .site-header { padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--rule); display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; }
  .site-header-left { display: flex; align-items: baseline; gap: 0.75rem; }
  .site-num { font-family: var(--mono); font-size: 0.65rem; font-weight: 500; color: var(--accent); letter-spacing: 0.1em; border: 1px solid var(--accent); padding: 2px 6px; border-radius: 2px; }
  .site-name { font-family: var(--serif-en); font-size: 1.1rem; font-weight: 400; color: var(--ink); text-decoration: none; }
  .back-link { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-muted); text-decoration: none; letter-spacing: 0.06em; transition: color 0.15s; }
  .back-link:hover { color: var(--accent); }

  /* ── Page header ── */
  .page-header { padding: 2.5rem 0 2rem; border-bottom: 1px solid var(--rule); }
  .page-label { font-family: var(--mono); font-size: 0.68rem; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .page-title { font-family: var(--serif-en); font-size: 2.8rem; font-weight: 400; color: var(--ink); letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 0.85rem; }
  .page-desc { font-family: var(--serif-cn); font-size: 0.9rem; font-weight: 300; color: var(--ink-secondary); line-height: 1.9; max-width: 520px; }
  .page-desc + .page-desc { margin-top: 0.6rem; }

  /* ── Content sections ── */
  .about-section { padding: 2rem 0; border-bottom: 1px solid var(--rule); }
  .about-section:last-of-type { border-bottom: none; }
  .section-label { font-family: var(--mono); font-size: 0.68rem; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 1.1rem; }

  /* ── 平台说明 block ── */
  .about-text { font-family: var(--serif-cn); font-size: 0.9rem; font-weight: 300; color: var(--ink-secondary); line-height: 1.9; max-width: 560px; }
  .about-text + .about-text { margin-top: 0.75em; }
  .about-highlight { color: var(--ink); font-weight: 400; }

  /* ── 分类说明 notice block ── */
  .notice-block { background: var(--paper-mid); border: 1px solid var(--rule); border-radius: 3px; padding: 1.25rem 1.5rem; }
  .notice-block p { font-family: var(--serif-cn); font-size: 0.875rem; font-weight: 300; color: var(--ink-secondary); line-height: 1.85; }
  .notice-block p + p { margin-top: 0.6em; }
  .notice-block .notice-key { font-family: var(--mono); font-size: 0.65rem; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 0.5rem; }

  /* ── 联络方式 ── */
  .contact-item { display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; padding: 1.25rem 1.5rem; border: 1px solid var(--rule); border-radius: 3px; margin-bottom: 0.75rem; background: var(--paper); flex-wrap: wrap; }
  .contact-item:last-child { margin-bottom: 0; }
  .contact-label { font-family: var(--mono); font-size: 0.6rem; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 0.3rem; }
  .contact-value { font-family: var(--mono); font-size: 0.88rem; color: var(--ink); }
  .contact-btn { font-family: var(--mono); font-size: 0.65rem; font-weight: 500; color: var(--paper); background: var(--accent); text-decoration: none; letter-spacing: 0.08em; padding: 7px 16px; border-radius: 2px; white-space: nowrap; transition: opacity 0.15s; flex-shrink: 0; }
  .contact-btn:hover { opacity: 0.85; }

  /* ── Footer ── */
  footer { padding: 2rem 0 3rem; border-top: 1px solid var(--rule); margin-top: 1rem; display: flex; justify-content: space-between; align-items: center; }
  .footer-mark { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-muted); }
  .footer-back { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-muted); text-decoration: none; letter-spacing: 0.06em; transition: color 0.15s; }
  .footer-back:hover { color: var(--accent); }

  @media (max-width: 560px) {
    .site-wrap { padding: 0 1.25rem; }
    .page-title { font-size: 2.1rem; }
    .contact-item { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
